# ============================================================
# Replace YOUR_RAILWAY_URL below with your actual Railway URL
# Example: https://mailer-platform-backend-production.up.railway.app
# ============================================================

[[redirects]]
  from = "/api/*"
  to = "https://mailer-platform-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/track/*"
  to = "https://mailer-platform-production.up.railway.app/track/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/unsubscribe/*"
  to = "https://mailer-platform-production.up.railway.app/unsubscribe/:splat"
  status = 200
  force = true

# This must be last — makes React routing work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
